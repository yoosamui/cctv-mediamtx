<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

* { box-sizing: border-box; }

body {
  margin: 0;
  background: radial-gradient(circle at top, #10253a 0%, #07111f 45%, #040b13 100%);
  color: white;
  font-family: Arial, sans-serif;
}

.container { max-width: 1400px; margin: auto; padding: 20px; }

.header {
  display: flex;
  justify-content: space-between;
  padding: 16px 24px;
  background: rgba(15,23,42,0.88);
  border-radius: 14px;
}

.header-title h1 { margin: 0; font-size: 22px; }
.header-title .highlight { color: #60a5fa; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.camera {
  background: rgba(15,23,42,0.88);
  border-radius: 14px;
  overflow: hidden;
}

.camera .title {
  padding: 12px;
  display: flex;
  justify-content: space-between;
  background: rgba(30,41,59,0.5);
}

.camera-live {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: #4ade80;
}

video {
  width: 100%;
  height:100%;
  background: black;
  object-fit: contain;
}

@media (max-width:768px) {
  .grid { grid-template-columns: 1fr; }
  video { height: 220px; }
}
</style>
</head>

<body>

<div class="container">


<div class="header">
  <div class="header-title">
    <a href="http://192.168.1.19:8881/" style="text-decoration:none;color:inherit;">
      <h1>CCTV <span class="highlight">Live Cameras</span></h1>
    </a>
  </div>
</div>

  <div class="grid">

    <div class="camera">
      <div class="title">Center <span class="camera-live">LIVE</span></div>
      <video id="center-video" autoplay muted playsinline controls></video>
    </div>

    <div class="camera">
      <div class="title">Gate <span class="camera-live">LIVE</span></div>
      <video id="gate-video" autoplay muted playsinline controls></video>
    </div>


    <div class="camera">
      <div class="title">Left <span class="camera-live">LIVE</span></div>
      <video id="left-video" autoplay muted playsinline controls></video>
    </div>


    <div class="camera">
      <div class="title">Entrance <span class="camera-live">LIVE</span></div>
      <video id="entrance-video" autoplay muted playsinline controls></video>
    </div>

   



<div class="camera">
      <div class="title">Behind <span class="camera-live">LIVE</span></div>
      <video id="behind-video" autoplay muted playsinline controls></video>
    </div>



    <div class="camera">
      <div class="title">Garage <span class="camera-live">LIVE</span></div>
      <video id="garage-video" autoplay muted playsinline controls></video>
    </div>
    
    

  </div>
</div>

<script>

const SERVER = "192.168.1.19";

/* ================= DEVICE DETECTION ================= */

const isIOS =
  /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

/* ================= STREAM FUNCTION ================= */

function setupStream(videoId, streamName, delay) {

  setTimeout(async () => {

    const video = document.getElementById(videoId);

    const hlsUrl = `http://${SERVER}:8888/${streamName}/index.m3u8`;
    const webrtcUrl = `http://${SERVER}:8889/${streamName}/whep`;

    console.log(streamName + " → init");

    /* =====================================================
       🍎 iPHONE / iOS → FORCE HLS ONLY (CRITICAL FIX)
    ===================================================== */
    if (isIOS) {

      console.log(streamName + ": iOS → HLS ONLY MODE");

      if (video.srcObject) video.srcObject = null;

      video.setAttribute("playsinline", "true");
      video.setAttribute("webkit-playsinline", "true");

      video.src = hlsUrl;
      video.load();

      video.play().catch(() => {});

      return;
    }

    /* =====================================================
       🥇 WEBRTC FIRST (DESKTOP + ANDROID)
    ===================================================== */

    try {

      const pc = new RTCPeerConnection({ iceServers: [] });

      pc.ontrack = (event) => {
        video.srcObject = event.streams[0];
        video.play().catch(() => {});
      };

      const offer = await pc.createOffer({
        offerToReceiveVideo: true
      });

      await pc.setLocalDescription(offer);

      const res = await fetch(webrtcUrl, {
        method: "POST",
        headers: { "Content-Type": "application/sdp" },
        body: offer.sdp
      });

      if (!res.ok) throw new Error("WebRTC failed");

      const answer = await res.text();
      await pc.setRemoteDescription({ type: "answer", sdp: answer });

      console.log(streamName + " → WebRTC LIVE");

      return;

    } catch (e) {
      console.log(streamName + " → fallback to HLS");
    }

    /* =====================================================
       🔁 HLS FALLBACK (ALL DEVICES)
    ===================================================== */

    if (video.srcObject) video.srcObject = null;

    if (Hls.isSupported()) {

      const hls = new Hls({
        lowLatencyMode: false,
        maxBufferLength: 10,        // FIX Firefox quality
        backBufferLength: 30,       // FIX smooth playback
        enableWorker: true
      });

      hls.loadSource(hlsUrl);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
      });

    } else {

      video.src = hlsUrl;
      video.play().catch(() => {});
    }

  }, delay);
}

/* ================= INIT CAMERAS ================= */

setupStream('center-video','center',0);
setupStream('entrance-video','entrance',1000);
setupStream('gate-video','gate',2000);
setupStream('left-video','left',3000);
setupStream('behind-video','behind',4000);
setupStream('garage-video','garage',5000);

</script>

</body>
</html>
