<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Camera Dashboard</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #07111f;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at top, #10253a 0%, #07111f 45%, #040b13 100%);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ===== HEADER WITH LIVE BADGE ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      margin-bottom: 20px;
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.35);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-left .icon {
      font-size: 28px;
    }

    .header-left h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #eff6ff;
    }

    .header-left h1 .highlight {
      color: #60a5fa;
    }

    .header-left .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* ===== LIVE BADGE PULSATING ===== */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      font-weight: 700;
      font-size: 16px;
      animation: pulse 1.5s ease-in-out infinite;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .live-badge .dot {
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    .live-badge .label {
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
    }

    /* ===== BACK BUTTON ===== */
    .back-link {
      color: #60a5fa;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    /* ===== CAMERA GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .camera {
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.35);
      transition: transform 0.2s, border-color 0.2s;
    }

    .camera:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.4);
    }

    .camera .title {
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      font-size: 16px;
      font-weight: 600;
      color: #bae6fd;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .camera .title .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    iframe {
      width: 100%;
      height: 280px;
      border: none;
      background: #0a0f1a;
      display: block;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      iframe {
        height: 220px;
      }
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 200px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .header-left h1 {
        font-size: 20px;
      }

      .live-badge {
        padding: 8px 16px;
        font-size: 14px;
        align-self: flex-start;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <!-- ===== HEADER WITH LIVE BADGE ===== -->
  <div class="header">
    <div class="header-left">
      <span class="icon">📹</span>
      <div>
        <h1>CCTV <span class="highlight">Live</span> Dashboard</h1>
        <div class="subtitle"><a href="http://192.168.1.19:8881/" class="back-link">← Back to Dashboard</a>
 - Raspberry Pi 5 · 6 Cameras Online</div>
      </div>
    </div>
    <div class="live-badge">
      <span class="dot"></span>
      <span class="label">● LIVE</span>
    </div>
  </div>

  <!-- ===== BACK BUTTON - Redirects to http://192.168.1.19:8881/ ===== -->
  <!--a href="http://192.168.1.19:8881/" class="back-link">← Back to Dashboard</a-->

  <!-- ===== CAMERA GRID ===== -->
  <div class="grid">

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Center</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/center/"></iframe>
    </div>

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Gate</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/gate/"></iframe>
    </div>

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Garage</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/garage/"></iframe>
    </div>

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Entrance</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/entrance/"></iframe>
    </div>

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Left</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/left/"></iframe>
    </div>

    <div class="camera">
      <div class="title"><span class="status-dot"></span> Behind</div>
      <iframe allow="autoplay; fullscreen" class="cam-frame" data-src="http://192.168.1.19:8889/behind/"></iframe>
    </div>
  </div>

</div>

<script>
  // Staggered loading script - loads frames 1 second apart
  document.querySelectorAll('.cam-frame').forEach((frame, index) => {
    setTimeout(() => {
      frame.src = frame.getAttribute('data-src');
    }, index * 1000);
  });
</script>

</body>
</html>
