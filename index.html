<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Live Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #07111f;
  color: white;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #10253a 0%, #07111f 45%, #040b13 100%);
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* ===== HEADER - NICE BANNER ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  margin-bottom: 20px;
  background: rgba(15, 23, 42, 0.88);
  border: 1px solid rgba(148, 163, 184, 0.18);
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.35);
  backdrop-filter: blur(10px);
  flex-wrap: nowrap;
  gap: 12px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* ===== BACK BUTTON - STYLED ===== */
.back-button {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(96, 165, 250, 0.1);
  border: 1px solid rgba(96, 165, 250, 0.2);
  border-radius: 8px;
  color: #93c5fd;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.25s ease;
  white-space: nowrap;
  flex-shrink: 0;
}

.back-button:hover {
  background: rgba(96, 165, 250, 0.2);
  border-color: rgba(96, 165, 250, 0.4);
  color: #bfdbfe;
  transform: translateX(-3px);
  box-shadow: 0 4px 12px rgba(96, 165, 250, 0.15);
}

.back-button .arrow {
  font-size: 16px;
  line-height: 1;
  transition: transform 0.2s ease;
}

.back-button:hover .arrow {
  transform: translateX(-2px);
}

.back-button .text {
  font-size: 12px;
  letter-spacing: 0.3px;
}

/* ===== HEADER DIVIDER ===== */
.header-divider {
  width: 1px;
  height: 30px;
  background: rgba(148, 163, 184, 0.15);
  flex-shrink: 0;
}

/* ===== TITLE SECTION - NO LIVE BADGE ===== */
.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.header-title .icon {
  font-size: 26px;
  flex-shrink: 0;
}

.header-title h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 700;
  color: #eff6ff;
  white-space: nowrap;
}

.header-title h1 .highlight {
  color: #60a5fa;
}

/* ===== RIGHT SIDE - EMPTY SPACER ===== */
.header-right {
  flex: 1;
  display: flex;
  justify-content: flex-end;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.camera {
  background: rgba(15, 23, 42, 0.88);
  border: 1px solid rgba(148, 163, 184, 0.18);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.35);
  transition: transform 0.2s, border-color 0.2s;
}

.camera:hover {
  transform: translateY(-4px);
  border-color: rgba(56, 189, 248, 0.4);
}

.camera .title {
  padding: 12px 16px;
  background: rgba(30, 41, 59, 0.5);
  font-size: 16px;
  font-weight: 600;
  color: #bae6fd;
  border-bottom: 1px solid rgba(148, 163, 184, 0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.camera .title .camera-name {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ===== PER-CAMERA LIVE INDICATOR ===== */
.camera-live {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 999px;
  background: rgba(34, 197, 94, 0.15);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: #4ade80;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.camera-live .dot {
  width: 7px;
  height: 7px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.camera-live .label {
  text-transform: uppercase;
  font-size: 9px;
}

.camera-live.error {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.3);
  color: #f87171;
}

.camera-live.error .dot {
  background: #ef4444;
  animation: none;
}

.camera-live.connecting {
  background: rgba(251, 191, 36, 0.15);
  border-color: rgba(251, 191, 36, 0.3);
  color: #fbbf24;
}

.camera-live.connecting .dot {
  background: #fbbf24;
  animation: pulse-dot 0.8s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.6); opacity:0.5; }
}

/* ===== VIDEO ===== */
video {
  width: 100%;
  height: 280px;
  display: block;
  background: #000;
  object-fit: contain;
}

/* ===== RESPONSIVE ===== */
@media (max-width:1024px) {
  video {
    height: 220px;
  }

  .header {
    padding: 14px 18px;
  }

  .header-title h1 {
    font-size: 20px;
  }
}

@media (max-width:768px) {
  .grid {
    grid-template-columns: 1fr;
  }

  video {
    height: 220px;
  }

  .header {
    flex-wrap: wrap;
    padding: 12px 16px;
    gap: 10px;
  }

  .header-left {
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
  }

  .header-title h1 {
    font-size: 18px;
  }

  .header-title .icon {
    font-size: 22px;
  }

  .header-divider {
    height: 24px;
  }

  .back-button {
    padding: 6px 12px;
    font-size: 12px;
  }

  .back-button .text {
    font-size: 11px;
  }

  .back-button .arrow {
    font-size: 14px;
  }

  .camera-live {
    padding: 3px 10px;
    font-size: 10px;
  }

  .camera-live .dot {
    width: 6px;
    height: 6px;
  }

  .camera-live .label {
    font-size: 8px;
  }
}

@media (max-width:480px) {
  .container {
    padding: 10px;
  }

  .header {
    padding: 10px 12px;
    border-radius: 10px;
    gap: 8px;
  }

  .header-left {
    gap: 6px;
  }

  .header-title h1 {
    font-size: 15px;
  }

  .header-title .icon {
    font-size: 18px;
  }

  .back-button {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 6px;
    gap: 4px;
  }

  .back-button .text {
    font-size: 9px;
  }

  .back-button .arrow {
    font-size: 12px;
  }

  .header-divider {
    height: 20px;
  }

  .camera .title {
    font-size: 14px;
    padding: 10px 12px;
  }

  .camera-live {
    padding: 2px 8px;
    font-size: 9px;
    gap: 4px;
  }

  .camera-live .dot {
    width: 5px;
    height: 5px;
  }

  .camera-live .label {
    font-size: 7px;
  }

  video {
    height: 180px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ===== HEADER BANNER - NO LIVE BADGE ===== -->
  <div class="header">
    <div class="header-left">
      <!-- Back Button -->
      <a href="http://192.168.1.19:8881/" class="back-button">
        <span class="arrow">←</span>
        <span class="text">Back</span>
      </a>

      <span class="header-divider"></span>

      <!-- Title - NO LIVE BADGE -->
      <div class="header-title">
        <h1>CCTV <span class="highlight">Live Cameras</span></h1>
      </div>
    </div>

    <!-- Right side - empty spacer -->
    <div class="header-right"></div>
  </div>

  <!-- ===== CAMERA GRID ===== -->
  <div class="grid">

 <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Gate
        </span>
        <span class="camera-live" id="live-gate">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="gate-video" autoplay muted playsinline controls></video>
    </div>





    <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Center
        </span>
        <span class="camera-live" id="live-center">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="center-video" autoplay muted playsinline controls></video>
    </div>



    <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Entrance
        </span>
        <span class="camera-live" id="live-entrance">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="entrance-video" autoplay muted playsinline controls></video>
    </div>

 <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Behind
        </span>
        <span class="camera-live" id="live-behind">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="behind-video" autoplay muted playsinline controls></video>
    </div>
    
    <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Garage
        </span>
        <span class="camera-live" id="live-garage">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="garage-video" autoplay muted playsinline controls></video>
    </div>

    <div class="camera">
      <div class="title">
        <span class="camera-name">
          <span class="status-dot"></span> Left
        </span>
        <span class="camera-live" id="live-left">
          <span class="dot"></span>
          <span class="label">LIVE</span>
        </span>
      </div>
      <video id="left-video" autoplay muted playsinline controls></video>
    </div>


  </div>

</div>

<script>

function setupHLS(videoId, streamName, delay) {

  setTimeout(() => {

    const video = document.getElementById(videoId);
    const liveIndicator = document.getElementById('live-' + streamName);

    const url =
      `http://192.168.1.19:8888/${streamName}/index.m3u8`;

    if (liveIndicator) {
      liveIndicator.className = 'camera-live connecting';
      liveIndicator.querySelector('.label').textContent = 'CONNECTING';
    }

    // ===== SAFARI =====

    if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = url;

      video.addEventListener('loadedmetadata', () => {

        if (liveIndicator) {
          liveIndicator.className = 'camera-live';
          liveIndicator.querySelector('.label').textContent = 'LIVE';
        }

        video.play().catch(() => {});
      });

      video.addEventListener('error', () => {

        if (liveIndicator) {
          liveIndicator.className = 'camera-live error';
          liveIndicator.querySelector('.label').textContent = 'ERROR';
        }

        console.log(streamName + ': restarting native HLS');

        setTimeout(() => {
          video.load();
        }, 5000);
      });

      return;
    }

    // ===== HLS.JS =====

    if (!Hls.isSupported()) {
      return;
    }

    const hls = new Hls({
      lowLatencyMode: true,
      backBufferLength: 10,
      maxBufferLength: 5,
      liveSyncDurationCount: 2,
      liveMaxLatencyDurationCount: 4
    });

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {

      if (liveIndicator) {
        liveIndicator.className = 'camera-live';
        liveIndicator.querySelector('.label').textContent = 'LIVE';
      }

      video.play().catch(() => {});
    });

    hls.on(Hls.Events.ERROR, (event, data) => {

      console.error(
        `[${streamName}]`,
        "type=", data.type,
        "details=", data.details,
        "fatal=", data.fatal
      );

      if (!data.fatal) {
        return;
      }

      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {

        console.log(streamName + ': recovering network error');

        if (liveIndicator) {
          liveIndicator.className = 'camera-live connecting';
          liveIndicator.querySelector('.label').textContent = 'RECOVER';
        }

        hls.startLoad();
        return;
      }

      if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {

        console.log(streamName + ': recovering media error');

        if (liveIndicator) {
          liveIndicator.className = 'camera-live connecting';
          liveIndicator.querySelector('.label').textContent = 'RECOVER';
        }

        hls.recoverMediaError();
        return;
      }

      console.log(streamName + ': rebuilding player');

      if (liveIndicator) {
        liveIndicator.className = 'camera-live error';
        liveIndicator.querySelector('.label').textContent = 'RESTART';
      }

      hls.destroy();

      setTimeout(() => {
        setupHLS(videoId, streamName, 0);
      }, 5000);
    });

    // ===== FREEZE WATCHDOG =====

    let lastTime = 0;
    let freezeCount = 0;

    setInterval(() => {

      if (video.paused || video.readyState < 2) {
        return;
      }

      if (video.currentTime === lastTime) {

        freezeCount++;

        if (freezeCount >= 2) {

          console.log(streamName + ': stream frozen');

          if (liveIndicator) {
            liveIndicator.className = 'camera-live connecting';
            liveIndicator.querySelector('.label').textContent = 'RECONNECT';
          }

          hls.stopLoad();

          setTimeout(() => {
            hls.startLoad();
          }, 1000);

          freezeCount = 0;
        }

      } else {

        freezeCount = 0;

        if (liveIndicator) {
          liveIndicator.className = 'camera-live';
          liveIndicator.querySelector('.label').textContent = 'LIVE';
        }
      }

      lastTime = video.currentTime;

    }, 30000);

  }, delay);
}

setupHLS('gate-video','gate',  0);
setupHLS('center-video', 'center', 1000);
setupHLS('garage-video',   'garage',   2000);
setupHLS('entrance-video', 'entrance', 3000);
setupHLS('left-video',     'left',     4000);
setupHLS('behind-video',   'behind',   5000);
</script>

</body>
</html>
